services:
  postgres:
    image: postgres:18-alpine
    container_name: tribelife-postgres
    ports:
      - "5435:5432"
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: tribelife
    volumes:
      - pgdata:/var/lib/postgresql/data
  valkey:
    image: valkey/valkey:latest
    container_name: tribelife-valkey-dev
    ports:
      - "6379:6379"
    healthcheck:
      test: [ "CMD", "valkey-cli", "ping" ]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped
volumes:
  pgdata:
