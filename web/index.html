        <h1>TribeLife — Meet Real People in Your Community</h1>
        <p>TribeLife is a community matching app that connects you with real people nearby. Create beacons for what you need — a pickleball partner, a babysitter, a tutor — and let TribeLife's intelligent matching connect you with your community.</p>
        <h2>Key Features</h2>
        <ul>
          <li><strong>Beacon Matching</strong> — Post what you need and get matched with relevant community members using AI.</li>
          <li><strong>Hyperlocal Discovery</strong> — Connect with people in your neighborhood, not across the globe.</li>
          <li><strong>Community-First Design</strong> — No vanity metrics. Every interaction creates genuine, lasting value.</li>
          <li><strong>Verified &amp; Safe</strong> — Real profiles, real people with verification.</li>
          <li><strong>Intelligent Matching</strong> — Smart algorithms surface the most relevant connections.</li>
        </ul>
        <h2>How It Works</h2>
        <ol>
          <li>Download TribeLife on iOS or Android and create your profile.</li>
          <li>Create a beacon describing what you need or offer.</li>
          <li>Get matched with the right people nearby.</li>
        </ol>
